[package]
name = "agent-lib"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1"
eventsource-stream = "0.2.3"
futures = "0.3"
httpdate = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
